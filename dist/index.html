<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base href="/" />
        <title>Donaciones Chihuahua</title>
        
        
<script type="module">
import init, * as bindings from '/donaciones_frontend-68fdac9ccc89ef8d.js';
const wasm = await init({ module_or_path: '/donaciones_frontend-68fdac9ccc89ef8d_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
        <link rel="stylesheet" href="/style-721770f5a7aead1e.css" integrity="sha384-hoxHMocyBlp7bnMUilYqW1vcfvAcAg8F7mao+ltA9whDVSR/T5hjDP/eEqYvzpZU"/>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="modulepreload" href="/donaciones_frontend-68fdac9ccc89ef8d.js" crossorigin="anonymous" integrity="sha384-B7ff+y2unlhKkgRqEhHpzlZacWxPg3ObRE3s1a4rDt6//hw+Bx++SsHuzikCKPHM"><link rel="preload" href="/donaciones_frontend-68fdac9ccc89ef8d_bg.wasm" crossorigin="anonymous" integrity="sha384-yreRQkZj9leeijK6xyKNkfDVS7o1rcATAIZ6DUfT2vj7pfnHj/QEqUEYHV05y//t" as="fetch" type="application/wasm"></head>
    <body>
        <div id="map"></div> 
        <script>
            let map;
            window.inicializarMapa = (lat, lng) => {
                if (map) map.remove();
                map = L.map('map').setView([lat, lng], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            };

            // Creamos la configuración para el nuevo marcador rojo
            const iconoRojo = L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
                iconSize: [25, 41],      // Tamaño del icono
                iconAnchor: [12, 41],    // Punto del icono que corresponderá a la coordenada del mapa
                popupAnchor: [1, -34],   // Punto desde donde se abrirá el popup respecto al iconAnchor
                shadowSize: [41, 41]     // Tamaño de la sombra
            });

            // Ahora recibimos el id_centro
            window.agregarMarcador = (lat, lng, nombre, id_centro) => {
                if (map) {
                    // Pasamos { icon: iconoRojo } como segundo parámetro al crear el marker
                    let marker = L.marker([lat, lng], { icon: iconoRojo }).addTo(map).bindPopup(nombre);
                    
                    // Evento de doble clic
                    marker.on('dblclick', function() {
                        // Buscamos la tarjeta con el ID correspondiente
                        const card = document.getElementById('centro-' + id_centro);
                        if (card) {
                            // Hacemos que la pantalla baje suavemente hasta la tarjeta
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            
                            // Le agregamos la clase para el efecto de destello
                            card.classList.add('tarjeta-destello');
                            
                            // Se la quitamos después de 1.5 segundos
                            setTimeout(() => {
                                card.classList.remove('tarjeta-destello');
                            }, 1500);
                        }
                    });
                }
            };
        </script>
    </body>
</html>
